server {
    listen 80;
    server_name bigbraincoding.com www.bigbraincoding.com;

    # Serve the local static build directly. Vercel artifacts remain on disk
    # but are not part of the live request path.
    root /var/www/bigbraincoding.com/html;
    index index.html index.htm;

    # Configure real IP handling for Traefik proxy
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Enhanced logging with detailed information
    access_log /var/log/nginx/bigbraincoding.com_access.log combined;
    access_log /var/log/nginx/bigbraincoding.com_tracking.log tracking;
    access_log /var/log/nginx/bigbraincoding.com_ip_tracking.log ip_tracking;
    error_log /var/log/nginx/bigbraincoding.com_error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Cache immutable build assets.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static tracking endpoint used by tracking.js.
    location = /api/tracking.php {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # PHP processing for any local PHP endpoints.
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Return 404 for dynamic Next.js API routes while Vercel/Node is disabled.
    location /api/ {
        return 404;
    }

    # Deny access to hidden files and directories such as .env, .git, and .vercel.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Main static site route.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}