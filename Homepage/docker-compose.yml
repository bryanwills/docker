services:
  homepage:
    # Migrated from the archived ghcr.io/benphelps/homepage to the actively
    # maintained gethomepage image. Config format is identical.
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      # REQUIRED on current versions when accessed via a reverse proxy / FQDN.
      # Without this you get "Host validation failed" and a blank page.
      HOMEPAGE_ALLOWED_HOSTS: homepage.bryanwills.dev
      TZ: America/New_York
    volumes:
      - /home/bryanwi09/docker/Homepage/config:/app/config
      # Read-only docker socket: enables container status/stats, not control.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      proxy:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.middlewares.homepage-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.homepage-http.entrypoints=web"
      - "traefik.http.routers.homepage-http.middlewares=homepage-https-redirect"
      - "traefik.http.routers.homepage-http.rule=Host(`homepage.bryanwills.dev`)"
      - "traefik.http.routers.homepage-secure.entrypoints=websecure"
      - "traefik.http.routers.homepage-secure.rule=Host(`homepage.bryanwills.dev`)"
      - "traefik.http.routers.homepage-secure.service=homepage"
      - "traefik.http.routers.homepage-secure.tls=true"
      - "traefik.http.routers.homepage-secure.tls.certresolver=letsencrypt"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  proxy:
    external: true
