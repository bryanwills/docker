---
# For configuration options and examples, please see:
# https://gethomepage.dev/latest/configs/docker/
#
# "my-docker" is an arbitrary label. It is referenced by each service in
# services.yaml via `server: my-docker`. The socket is mounted read-only in
# docker-compose.yml, so Homepage can read container status/stats but cannot
# start/stop containers (use Portainer for control).

my-docker:
  socket: /var/run/docker.sock
