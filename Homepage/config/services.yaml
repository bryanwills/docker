---
# For configuration options and examples, please see:
# https://gethomepage.dev/latest/configs/services
#
# Each service binds to a running container via `server` + `container` so that
# Homepage shows live up/down status (and stats on click). `href` opens the
# public Traefik URL in a new tab (target is set globally in settings.yaml).
# Icons are auto-resolved from https://github.com/homarr-labs/dashboard-icons.
#
# Group order below = display order on the dashboard (top to bottom).

- Edge & Management:
    - Traefik:
        href: https://traefik.bryanwills.dev
        target: _blank
        description: Reverse proxy / router dashboard
        icon: traefik.png
        server: my-docker
        container: traefik
    - Portainer:
        href: https://portainer.bryanwills.dev
        target: _blank
        description: Container management & control
        icon: portainer.png
        server: my-docker
        container: portainer
    - Cockpit:
        href: https://cockpit.bryanwills.dev
        target: _blank
        description: Linux server manager
        icon: cockpit.png
        siteMonitor: https://cockpit.bryanwills.dev
    - bryanwills.dev:
        href: https://bryanwills.dev
        target: _blank
        description: Personal site (Nginx)
        icon: nginx.png
        server: my-docker
        container: nginx
    - bigbraincoding.com:
        href: https://bigbraincoding.com
        target: _blank
        description: Big Brain Coding (Nginx)
        icon: nginx.png
        server: my-docker
