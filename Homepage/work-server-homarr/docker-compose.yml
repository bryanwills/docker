services:
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persistent app data (users, boards, settings, sqlite db).
      - ./appdata:/appdata
      # Read-only docker socket enables the Docker integration: container list,
      # live status, and (for logged-in admins) start/stop/restart controls.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      # Must be the SAME external network Traefik uses on the work VM.
      # Find it with: docker inspect traefik -f '{{json .NetworkSettings.Networks}}'
      # then replace ${PROXY_NETWORK} in .env (default below assumes "proxy").
      proxy:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK}"
      # Serve Homarr at the ROOT of the work domain (example.com).
      # Low priority so longer path routers (e.g. /netbox, /nautobot) win first.
      - "traefik.http.routers.homarr.rule=Host(`${HOMARR_FQDN}`)"
      - "traefik.http.routers.homarr.priority=1"
      - "traefik.http.routers.homarr.entrypoints=websecure"
      - "traefik.http.routers.homarr.tls=true"
      - "traefik.http.routers.homarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.homarr.loadbalancer.server.port=7575"
    security_opt:
      - no-new-privileges:true

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK}
